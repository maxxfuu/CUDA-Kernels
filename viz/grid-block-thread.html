:root { color-scheme: dark; }

body {
  margin: 0;
  background: #111111;
  min-height: 100vh;
  display: grid;
  place-items: center;
}

.cv-canvas {
  --cv-bg: #111111;       /* warm near-black */
  --cv-fg: #F0EDE6;       /* chalk white — all text */
  --cv-accent: #FF3B30;   /* signal red — work happening now + accents */
  --cv-traffic: #6DA7EC;  /* packet blue — data in motion (+ comet trails) */
  --cv-green: #FF3B30;    /* work: compute components (signal red) */
  --cv-blue: #27B648;     /* state: memory / data at rest (green) */
  --cv-neutral: #7E7C76;  /* cream @45% over bg — passive structure + connectors */
  /* code-trace token colors (editor convention; used by CV.codeBlock) */
  --cv-code-string: #CE9178;   /* strings — warm salmon */
  --cv-code-fn: #DCDCAA;       /* functions — soft gold */
  --cv-code-type: #4EC9B0;     /* types/classes — teal */
  --cv-code-kw: #C586C0;       /* keywords — purple */
  --cv-code-var: #9CDCFE;      /* variables — light blue (italic) */
  --cv-code-comment: #6A9955;  /* comments — muted green (italic) */
  --cv-code-num: #B5CEA8;      /* numbers */
  --cv-code-punc: #D4D4D4;     /* operators & punctuation */
  background: var(--cv-bg);
  font-family: "Wafer Display", "ABC Schengen", "Archivo", system-ui, sans-serif;
}

.cv-canvas text {
  font-family: inherit;
  font-weight: 500;
  fill: var(--cv-fg);
  user-select: none;
}

/* player controls (hidden in ?mode=loop) */
.cv-controls {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 14px;
  display: flex;
  gap: 12px;
  align-items: center;
  color: #F0EDE6;
  font-family: "Wafer Display", "ABC Schengen", "Archivo", system-ui, sans-serif;
  font-size: 12px;
}
.cv-controls button {
  background: none;
  border: 1px solid #7E7C76;
  color: #F0EDE6;
  font: inherit;
  padding: 3px 12px;
  cursor: pointer;
}
.cv-controls button:hover { border-color: #F0EDE6; }
.cv-controls input[type="range"] {
  width: 300px;
  accent-color: #FF3B30;
}
.cv-controls .cv-time { min-width: 84px; text-align: right; }

</style>

<body>
<script>
/* ============================================================
   cuda-viz core library v0.1
   Vanilla SVG + JS diagram/animation primitives.
   Design rules (from PlanetScale brand diagrams):
   - one color per component
   - box = solid 2px outer rect + 8px-inset dashed (8 8) inner
     rect carrying fill-opacity 0.1 of the same color
   - 45° 1px hatch (clipPath'd to inner rect) = emphasis state
   - connectors: neutral gray 1px dashed (8 6), elbow-routed,
     small triangle arrowheads
   - data in motion: r=5 traffic-colored circles
   - labels: ALL-CAPS JetBrains Mono, fg color, bg plate
   - animation: rAF only; all track fns are pure functions of
     (progress, t) so the timeline is scrub- and seek-safe
   ============================================================ */
const CV = (() => {
  const NS = 'http://www.w3.org/2000/svg';
  const COLORS = {
    compute: 'var(--cv-green)',
    memory:  'var(--cv-blue)',
    neutral: 'var(--cv-neutral)',
    traffic: 'var(--cv-traffic)',
    accent:  'var(--cv-accent)',
    fg:      'var(--cv-fg)',
    bg:      'var(--cv-bg)',
  };
  let uid = 0;
  const nextId = (p) => `cv-${p}-${++uid}`;

  function el(tag, attrs = {}, parent) {
    const e = document.createElementNS(NS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    if (parent) parent.appendChild(e);
    return e;
  }
  const color = (c) => COLORS[c] || c;

  /* ---------- canvas ---------- */
  function canvas(root, { w = 1280, h = 720, auto = false } = {}) {
    const svg = el('svg', {
      viewBox: `0 0 ${w} ${h}`, width: w, height: h,
      class: 'cv-canvas' + (auto ? ' cv-auto' : ''),
    }, root);
    const defs = el('defs', {}, svg);
    const marker = el('marker', {
      id: 'cv-arrow', viewBox: '0 0 6 6', refX: 5, refY: 3,
      markerWidth: 6, markerHeight: 6, orient: 'auto-start-reverse',
    }, defs);
    el('path', { d: 'M 0 0 L 6 3 L 0 6 z', fill: 'var(--cv-neutral)' }, marker);
    return { svg, defs, w, h };
  }

  /* ---------- label with optional bg plate ---------- */
  function label(cv, { x, y, text, size = 17, fill = 'fg', anchor = 'middle', plate = true, lineHeight = 1.25 }) {
    const g = el('g', {}, cv.svg);
    const lines = Array.isArray(text) ? text : [String(text)];
    const t = el('text', {
      x, y, 'text-anchor': anchor, 'font-size': size,
      'dominant-baseline': 'middle',
    }, g);
    t.style.fill = color(fill); // inline style so it beats the theme's text{fill} rule
    lines.forEach((ln, i) => {
      el('tspan', { x, dy: i === 0 ? `${-(lines.length - 1) * lineHeight / 2}em` : `${lineHeight}em` }, t).textContent = ln;
    });
    let plateRect = null;
    if (plate) {
      const bb = t.getBBox();
      plateRect = el('rect', {
        x: bb.x - 5, y: bb.y - 2, width: bb.width + 10, height: bb.height + 4,
        fill: 'var(--cv-bg)',
      });
      g.insertBefore(plateRect, t);
    }
    return { g, t, plate: plateRect };
  }

  /* ---------- serpentine (single-stroke "active" texture) ---------- */
  // One continuous line: diagonals joined by short runs ALONG the region
  // border — the pen never lifts (replaces parallel hatching everywhere).
  // Activation is a DRAW-IN: progress 0→1 draws the line from its start.
  // The wrapper maps hatch.setAttribute('opacity', v) onto that progress
  // so existing diagram code works unchanged.
  function serpRect(x0, y0, x1, y1, gap) {
    const entry = (k) => k <= x0 + y1 ? [x0, k - x0] : [k - y1, y1];   // left ↓ then bottom →
    const exit  = (k) => k <= x1 + y0 ? [k - y0, y0] : [x1, k - x1];   // top → then right ↓
    const pts = [];
    let i = 0;
    for (let k = x0 + y0 + gap; k < x1 + y1; k += gap, i++) {
      const e1 = entry(k), e2 = exit(k);
      const up = i % 2 === 0;
      const a = up ? e1 : e2, b = up ? e2 : e1;
      if (pts.length) {
        const prev = pts[pts.length - 1];
        if (up  && prev[0] === x0 && a[1] === y1 && a[0] > x0) pts.push([x0, y1]);
        if (!up && prev[1] === y0 && a[0] === x1 && a[1] > y0) pts.push([x1, y0]);
      }
      pts.push(a, b);
    }
    if (!pts.length) return '';
    return 'M ' + pts.map(p => `${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(' L ');
  }
  function serpEllipse(cx, cy, rx, ry, gap) {
    const segs = [];
    const ang = (p) => Math.atan2((p[1] - cy) / ry, (p[0] - cx) / rx);
    let prev = null, i = 0;
    const kSpan = Math.hypot(rx, ry);
    for (let K = -kSpan + gap; K < kSpan; K += gap) {
      const a2 = 1 / (rx * rx) + 1 / (ry * ry);
      const b2 = -2 * K / (ry * ry);
      const c2 = K * K / (ry * ry) - 1;
      const disc = b2 * b2 - 4 * a2 * c2;
      if (disc <= 0) continue;
      const r = Math.sqrt(disc);
      const uLo = (-b2 - r) / (2 * a2), uHi = (-b2 + r) / (2 * a2);
      const k = K + cx + cy;
      const pLo = [cx + uLo, k - (cx + uLo)];   // lower-left end
      const pHi = [cx + uHi, k - (cx + uHi)];   // upper-right end
      const up = i % 2 === 0;
      const a = up ? pLo : pHi, b = up ? pHi : pLo;
      if (prev) {
        let d = ang(a) - ang(prev);
        while (d <= -Math.PI) d += 2 * Math.PI;
        while (d > Math.PI) d -= 2 * Math.PI;
        segs.push(`A ${rx} ${ry} 0 0 ${d > 0 ? 1 : 0} ${a[0].toFixed(2)} ${a[1].toFixed(2)}`);
      } else {
        segs.push(`M ${a[0].toFixed(2)} ${a[1].toFixed(2)}`);
      }
      segs.push(`L ${b[0].toFixed(2)} ${b[1].toFixed(2)}`);
      prev = b;
      i++;

    return segs.join(' ');
  }
  function serpWrap(cv, g, d, col, { drawn = false, dashed = null } = {}) {
    // shows at once (opacity fade, like the old hatch — no draw-in).
    // if a dashed inner border is linked, it crossfades: dashes ease out
    // while the active texture is up, and ease back in as it fades away.
    const path = el('path', {
      d, fill: 'none', stroke: col, 'stroke-width': 1, opacity: drawn ? 1 : 0,
    }, g);
    return {
      el: path,
      setAttribute(attr, v) {

  /* ---------- component box (the signature anatomy) ---------- */
  // contentTop: y-coord of the first child component inside the box; a top label
  // is vertically centered between the inner dashed edge and that content.
  function box(cv, { x, y, w, h, color: c = 'neutral', label: lbl = '', labelPos = 'center',
                     fontSize = 17, inset = 8, dash = '8 8', hatchGap = 10, contentTop = null }) {
    const col = color(c);
    const g = el('g', { class: 'cv-box' }, cv.svg);
    const outer = el('rect', { x, y, width: w, height: h, fill: 'none', stroke: col, 'stroke-width': 2 }, g);
    const ix = x + inset, iy = y + inset, iw = w - 2 * inset, ih = h - 2 * inset;
    const inner = el('rect', {

      fill: col, 'fill-opacity': 0.1,
      stroke: col, 'stroke-width': 1, 'stroke-dasharray': dash,
    }, g);

    const hatch = serpWrap(cv, g, serpRect(ix, iy, ix + iw, iy + ih, hatchGap), col, { dashed: inner });

        : y + h / 2;
      labelApi = label(cv, { x: x + w / 2, y: ly, text: lbl, size: fontSize });
      g.appendChild(labelApi.g);

    return { g, outer, inner, hatch, label: labelApi, x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
  }

  /* ---------- mini box (small cells/chips: 1px solid + 0.1 fill, bg plate) ---------- */
  function miniBox(cv, { x, y, w, h, color: c = 'neutral', label: lbl = '', fontSize = 13 }) {
    const col = color(c);
    const g = el('g', { class: 'cv-mini' }, cv.svg);
    el('rect', { x, y, width: w, height: h, fill: 'var(--cv-bg)' }, g); // occlusion plate
    const fillRect = el('rect', { x, y, width: w, height: h, fill: col, 'fill-opacity': 0.1, stroke: col, 'stroke-width': 1 }, g);
    let text = null;
    if (lbl) {
      text = el('text', {
        x: x + w / 2, y: y + h / 2, 'text-anchor': 'middle',
        'dominant-baseline': 'central', 'font-size': fontSize,
      }, g);
      text.textContent = lbl;
    }
    return { g, fillRect, text, x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
  }

  /* ---------- cylinder (memory/storage; hatched top face) ---------- */
  function cylinder(cv, { x, y, w, h, color: c = 'memory', label: lbl = '', fontSize = 17, ry = null }) {
    const col = color(c);
    const eRy = ry || Math.min(18, h / 5);
    const g = el('g', { class: 'cv-cyl' }, cv.svg);
    const body = el('path', {
      d: `M ${x} ${y + eRy} L ${x} ${y + h - eRy}
          A ${w / 2} ${eRy} 0 0 0 ${x + w} ${y + h - eRy}
          L ${x + w} ${y + eRy}`,
      fill: col, 'fill-opacity': 0.1, stroke: col, 'stroke-width': 2,
    }, g);
    // top face carries the permanent serpentine (single stroke riding the rim)
    const hatch = serpWrap(cv, g,
      serpEllipse(x + w / 2, y + eRy, w / 2 - 3, Math.max(3, eRy - 2), 8), col, { drawn: true });
    // fill level ("liquid") — state lives IN the component: memory filling/freeing
    // is shown by raising/draining this level, never by symbolic dots leaving.
    const lvlBody = el('path', { fill: col, 'fill-opacity': 0.3, stroke: 'none', opacity: 0 }, g);
    const lvlTop = el('ellipse', {
      rx: w / 2, ry: eRy, fill: col, 'fill-opacity': 0.25,
      stroke: col, 'stroke-width': 1, opacity: 0,
    }, g);
    function setLevel(v) {
      if (v <= 0.005) { lvlBody.setAttribute('opacity', 0); lvlTop.setAttribute('opacity', 0); return; }
      const innerTop = y + 2 * eRy, innerBot = y + h - eRy;
      const yl = innerBot - Math.min(1, v) * (innerBot - innerTop);
      lvlBody.setAttribute('d',
        `M ${x} ${yl} L ${x} ${innerBot}
         A ${w / 2} ${eRy} 0 0 0 ${x + w} ${innerBot}
         L ${x + w} ${yl}
         A ${w / 2} ${eRy} 0 0 1 ${x} ${yl}`);
      lvlTop.setAttribute('cx', x + w / 2);
      lvlTop.setAttribute('cy', yl);
      lvlBody.setAttribute('opacity', 1);
      lvlTop.setAttribute('opacity', 1);
    }
    el('ellipse', {
      cx: x + w / 2, cy: y + eRy, rx: w / 2, ry: eRy,
      fill: 'none', stroke: col, 'stroke-width': 2,
    }, g);
    let labelApi = null;
    if (lbl) {
      labelApi = label(cv, { x: x + w / 2, y: y + h / 2 + eRy / 2, text: lbl, size: fontSize });
      g.appendChild(labelApi.g);
    }
    return { g, hatch, setLevel, x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
  }

  /* ---------- connectors ---------- */
  // points: [[x,y], ...] — orthogonal elbow routing expected
  function elbow(cv, points, { dash = '8 6', arrow = true, color: c = 'neutral', hidden = false } = {}) {
    const d = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');
    const attrs = { d, fill: 'none' };
    if (hidden) {
      attrs.stroke = 'none';
    } else {
      attrs.stroke = color(c);
      attrs['stroke-width'] = 1;
      if (dash) attrs['stroke-dasharray'] = dash;
      if (arrow) attrs['marker-end'] = 'url(#cv-arrow)';
    }
    const path = el('path', attrs, cv.svg);
    return path;
  }

  /* ---------- traffic particles (pooled; head + fading trail) ---------- */
  // each particle is a head circle plus a short comet trail of smaller,
  // dimmer circles trailing BEHIND it along the same path — movement reads
  // even in a single frame. Trail circles are created first (under the head).
  const TRAIL_R = [3.4, 2.5, 1.7];
  const TRAIL_O = [0.5, 0.3, 0.15];
  const TRAIL_SPACING = 9; // px behind the head, per segment
  function particles(cv, n) {
    const pool = [];
    for (let i = 0; i < n; i++) {
      const trail = TRAIL_R.map((r, k) =>
        el('circle', { r, fill: 'var(--cv-traffic)', opacity: 0 }, cv.svg));
      const head = el('circle', { r: 5, fill: 'var(--cv-traffic)', opacity: 0 }, cv.svg);
      pool.push({
        head, trail,
        // legacy escape hatch: diagrams that hide a dot directly still work
        setAttribute(attr, v) {
          head.setAttribute(attr, v);
          if (attr === 'opacity' && !(parseFloat(v) > 0)) trail.forEach(c => c.setAttribute('opacity', 0));
        },
      });
    }
    return pool;
  }
  const _lenCache = new WeakMap();
  // place dot (head + trail) along path at progress p; hides at p<=0 or p>=1
  function dotAlong(dot, path, p) {
    const head = dot.head || dot;             // plain circles still work
    const trail = dot.trail || [];
    if (p <= 0 || p >= 1) {
      head.setAttribute('opacity', 0);
      trail.forEach(c => c.setAttribute('opacity', 0));
      return;
    }
    let L = _lenCache.get(path);
    if (L === undefined) { L = path.getTotalLength(); _lenCache.set(path, L); }
    const at = (dist, node, o) => {
      if (dist <= 0) { node.setAttribute('opacity', 0); return; }
      const pt = path.getPointAtLength(dist);
      node.setAttribute('cx', pt.x);
      node.setAttribute('cy', pt.y);
      node.setAttribute('opacity', o);

    trail.forEach((c, k) => at(p * L - (k + 1) * TRAIL_SPACING, c, TRAIL_O[k]));
  }

  /* ---------- code block (algorithm traces) ---------- */
  // Bare — no box, no borders. The CALLER centers the block in its section
  // (both axes; measure the block as one component). Syntax colors come from
  // the --cv-code-* theme variables: strings salmon, functions gold, types
  // teal, keywords purple, variables light blue italic, comments green italic.
  // Returns {g, yOfLine, width, bar}. `bar` is the packet-blue execution
  // cursor — drive bar.set(y, opacity) from ONE state fn, and EASE it:
  //   barY = lerp(yOfLine(prevLine), yOfLine(curLine), ease.io(min(1, frac/0.4)))
  // Cursors slide between positions and ease in/out at the ends —
  // they NEVER hard-switch. (Same rule applies to cell highlight rings.)
  const CODE_KW = /^(for|while|if|else|return|do|switch|case|break|continue|goto|sizeof|new|delete)$/;
  const CODE_TYPE = /^(void|float|int|char|double|long|short|unsigned|signed|bool|size_t|auto|struct|const|static|__global__|__shared__|__device__|__restrict__|dim3|float4|half)$/;

      x: x - 14, y: yOfLine(0), width, height: lineHeight - 4,

      stroke: 'var(--cv-traffic)', 'stroke-width': 1, opacity: 0,

    const TOKRE = /(\/\/.*$|\/\*.*?\*\/)|("(?:[^"\\]|\\.)*")|(\b\d[\w.]*)|([A-Za-z_]\w*)|(\s+)|(.)/g;
    lines.forEach((ln, r) => {
      const t = el('text', {
        x, y: y + r * lineHeight, 'font-size': size, 'xml:space': 'preserve',
        style: 'font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre',
      }, g);
      let mres;
      TOKRE.lastIndex = 0;
      while ((mres = TOKRE.exec(ln)) !== null) {
        let sty = null;
        if (mres[1]) sty = 'fill:var(--cv-code-comment);font-style:italic';
        else if (mres[2]) sty = 'fill:var(--cv-code-string)';
        else if (mres[3]) sty = 'fill:var(--cv-code-num)';
        else if (mres[4]) {
          const w = mres[4];
          sty = CODE_TYPE.test(w) ? 'fill:var(--cv-code-type)'
              : CODE_KW.test(w) ? 'fill:var(--cv-code-kw)'
              : ln[TOKRE.lastIndex] === '(' ? 'fill:var(--cv-code-fn);font-weight:700'
              : 'fill:var(--cv-code-var);font-style:italic';

        span.textContent = mres[0];

      g, yOfLine, width,
      bar: { el: bar, set(yy, o) { bar.setAttribute('y', yy); bar.setAttribute('opacity', o); } },
    };
  }

  /* ---------- timeline (stateless, scrub-safe) ---------- */
  const ease = {
    linear: (p) => p,
    io: (p) => p * p * (3 - 2 * p),
  };
  // Global pacing: every diagram plays STRETCH× slower than its authored
  // times. Track times and state windows stay in "story time" — render()
  // maps stretched wall-clock time back before evaluating, so existing
  // diagram code needs no changes.
  const STRETCH = 1.25;
  function timeline(duration) {
    const tracks = [];
    const api = {
      duration: duration * STRETCH,
      // fn(progress in [0,1], absoluteT) — must be idempotent
      add(start, dur, fn, e) {
        tracks.push({ start, dur: Math.max(dur, 1e-9), fn, e: e || ease.linear });
        return api;
      },
      // always-on state track: fn(t) every render (runs after transitions)
      state(fn) { tracks.push({ state: fn }); return api; },
      render(t) {
        const s = t / STRETCH;
        for (const tr of tracks) {
          if (tr.state) { tr.state(s); continue; }
          let p = (s - tr.start) / tr.dur;
          p = p < 0 ? 0 : p > 1 ? 1 : p;
          tr.fn(tr.e(p), s);
        }

  }
  // helper: 0→1→0 window with soft edges (for hatch/exec states)
  function inWindow(t, start, end, fade = 0.3) {

    return Math.min(1, (t - start) / fade, (end - t) / fade);
  }

  /* ---------- player: rAF loop + controls + deterministic seek ---------- */

    const loopMode = params.get('mode') === 'loop';

    let base = performance.now() / 1000;
    let offset = params.has('t') ? parseFloat(params.get('t')) : 0;
    const cur = () => ((performance.now() / 1000 - base) + offset) % tl.duration;

      ui = document.createElement('div');
      ui.className = 'cv-controls';
      ui.innerHTML = `<button class="cv-play">PAUSE</button>
        <input type="range" min="0" max="${tl.duration}" step="0.01" value="0">
        <span class="cv-time">0.00 / ${tl.duration.toFixed(2)}s</span>`;

      const btn = ui.querySelector('button');
      const rng = ui.querySelector('input');
      btn.addEventListener('click', () => {
        if (playing) { offset = cur(); playing = false; btn.textContent = 'PLAY'; }
        else { base = performance.now() / 1000; playing = true; btn.textContent = 'PAUSE'; }
      });
      rng.addEventListener('input', () => {
        playing = false; btn.textContent = 'PLAY';
        offset = parseFloat(rng.value);
        tl.render(offset);
        ui.querySelector('.cv-time').textContent = `${offset.toFixed(2)} / ${tl.duration.toFixed(2)}s`;
      });
    }
    // deterministic seek for frame capture / video export
    window.__seek = (t) => { playing = false; offset = t % tl.duration; tl.render(offset); };
    window.__duration = tl.duration;

    function frame() {
      if (playing) {
        const t = cur();
        tl.render(t);
        if (ui) {
          ui.querySelector('input').value = t;
          ui.querySelector('.cv-time').textContent = `${t.toFixed(2)} / ${tl.duration.toFixed(2)}s`;
        }
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  return { el, color, canvas, label, box, miniBox, cylinder, elbow, particles, dotAlong, codeBlock, timeline, ease, inWindow, player, serpRect, serpEllipse, serpWrap };
})();

</script>
<script>

   3. isolate BLOCK 1 → left column; code + red dot-product
      cluster + dividers all set in place at once
   4. white hero thread bounces; trace the kernel — sliding
      textured highlight rides A[k]/B[k]; C accumulates
   5. FINALE: left morphs back into the full grid of blocks,
      right keeps only cell C (top-left of a 6x6 C matrix);
      ALL threads jump at once while the matrix churns, then

}, gridG));

// accent serpentine texture inside C while it computes
const cHatch = CV.serpWrap(cv, ccell.g, CV.serpRect(CCX + 4, CCY + 4, CCX + VS - 4, CCY + VS - 4, 7), C('accent'));
// value on a bg plate over the texture (kept inside the group so it morphs along)
const cvalPlate = CV.el('rect', { x: Cc[0] - 20, y: Cc[1] - 11, width: 40, height: 22, fill: 'var(--cv-bg)', opacity: 0 }, ccell.g);
const cval = CV.el('text', { x: Cc[0], y: Cc[1], 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': 15 }, ccell.g);
cval.style.fill = C('fg'); cval.setAttribute('opacity', 0);

// --- row vector A & col vector B (red) ---
const Acells = Aval.map((v, k) => { const m = CV.miniBox(cv, { x: Ax(k), y: CCY, w: VS, h: VS, color: 'accent', label: v.toFixed(1), fontSize: 15 }); m.g.setAttribute('opacity', 0); return m; });
const Bcells = Bval.map((v, k) => { const m = CV.miniBox(cv, { x: CCX, y: By(k), w: VS, h: VS, color: 'accent', label: v.toFixed(1), fontSize: 15 }); m.g.setAttribute('opacity', 0); return m; });
const alabA = CV.label(cv, { x: CCX - GAP - K * VS / 2, y: CCY + VS + 26, text: 'ROW OF A', size: 15, fill: 'fg' }); alabA.g.setAttribute('opacity', 0);
const alabB = CV.label(cv, { x: CCX + VS + 60, y: CCY - GAP - K * VS / 2, text: 'COL OF B', size: 15, fill: 'fg' }); alabB.g.setAttribute('opacity', 0);

// --- sliding textured highlight rings (drawn on TOP of the cells so all
//     four sides show; ring = 2.5px border + serpentine inside) ---
function makeRing() {
  const g = CV.el('g', { opacity: 0 }, cv.svg);
  CV.el('rect', { x: 0, y: 0, width: VS, height: VS, fill: 'none', stroke: C('accent'), 'stroke-width': 2.5 }, g);
  return g;
}
const ringA = makeRing(), ringB = makeRing();

// --- kernel code (right column, top row) ---
const code = CV.codeBlock(cv, { x: 700, y: 110, size: 12.5, lineHeight: 21, lines: [
  '__global__ void matmul(float *C,',
  '    float *A, float *B, int N) {',
  '  int row = blockIdx.y*blockDim.y + threadIdx.y;',
  '  int col = blockIdx.x*blockDim.x + threadIdx.x;',
  '  float sum = 0.0f;',
  '  for (int k = 0; k < N; k++)',
  '    sum += A[row*N+k] * B[k*N+col];',
  '  C[row*N+col] = sum;',
  '}',
] });
code.g.setAttribute('opacity', 0);

// --- section dividers (dotted) ---
const divV = CV.elbow(cv, [[470, 90], [470, 690]], { arrow: false });
const divH = CV.elbow(cv, [[490, 310], [1270, 310]], { arrow: false });
divV.setAttribute('opacity', 0);
divH.setAttribute('opacity', 0);

// --- finale: 6x6 output matrix (cell [0][0] is C itself) ---
const mcells = [];
for (let i = 1; i < MN * MN; i++) {
  const r = (i / MN) | 0, c = i % MN;
  const m = CV.miniBox(cv, { x: MX + c * MS, y: MY + r * MS, w: VS, h: VS, color: 'accent' });
  m.g.setAttribute('opacity', 0);
  const serp = CV.serpWrap(cv, m.g, CV.serpRect(m.x + 4, m.y + 4, m.x + VS - 4, m.y + VS - 4, 7), C('accent'));
  const plate = CV.el('rect', { x: m.cx - 20, y: m.cy - 10, width: 40, height: 20, fill: 'var(--cv-bg)', opacity: 0 }, m.g);
  const txt = CV.el('text', { x: m.cx, y: m.cy, 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': 13 }, m.g);
  txt.style.fill = C('fg'); txt.setAttribute('opacity', 0);
  mcells.push({ m, serp, plate, txt, i });
}
const mlab = CV.label(cv, { x: MX + (MN * MS - 6) / 2, y: 210, text: 'C · 6×6', size: 16, fill: 'fg' });
mlab.g.setAttribute('opacity', 0);
const glab2 = CV.label(cv, { x: 320, y: 210, text: 'GRID', size: 16, fill: 'fg' });
glab2.g.setAttribute('opacity', 0);

// --- annotations (all WHITE) ---
const anGrid = CV.label(cv, { x: 640, y: 596, text: '9 BLOCKS · EACH WITH ITS OWN THREADS', size: 16, fill: 'fg', plate: false }); anGrid.g.setAttribute('opacity', 0);
const anIso  = CV.label(cv, { x: 230, y: 620, text: 'ISOLATE ONE BLOCK', size: 16, fill: 'fg', plate: false }); anIso.g.setAttribute('opacity', 0);
const anMap  = CV.label(cv, { x: 640, y: 682, text: 'EACH THREAD = ONE OUTPUT ELEMENT', size: 16, fill: 'fg', plate: false }); anMap.g.setAttribute('opacity', 0);
const anDot  = CV.label(cv, { x: 660, y: 420, text: 'C[row][col] = Σ A[k]·B[k]', size: 16, fill: 'fg', plate: true }); anDot.g.setAttribute('opacity', 0);
const anPar  = CV.label(cv, { x: 960, y: 612, text: 'ALL BLOCKS · ALL THREADS · AT ONCE', size: 16, fill: 'fg', plate: false }); anPar.g.setAttribute('opacity', 0);

/* ---------------- timeline ---------------- */
const DUR = 26.4;
const tl = CV.timeline(DUR);

// P1 title + green box
tl.add(0.0, 0.7, p => titleA.g.setAttribute('opacity', p), E.io);
tl.add(0.0, 0.8, p => gbox.g.setAttribute('opacity', p), E.io);
// P2 grid lines
tl.add(0.8, 0.6, p => vlines.forEach(l => l.setAttribute('y2', lerp(GY, GY + 3 * CELL, p))), E.io);
tl.add(1.1, 0.6, p => hlines.forEach(l => l.setAttribute('x2', lerp(GX, GX + 3 * CELL, p))), E.io);
// P3 light blocks
blocks.forEach((b, i) => {
  const s = 1.7 + i * 0.22;
  tl.add(s, 0.45, p => { b.fill.setAttribute('fill-opacity', 0.16 * p); b.lab.g.setAttribute('opacity', p); }, E.io);
});
// P4 threads populate
blocks.forEach((b, i) => tl.add(3.9 + i * 0.15, 0.5, p => b.tg.setAttribute('opacity', p), E.io));
tl.add(2.5, 3.7, (p, t) => anGrid.g.setAttribute('opacity', CV.inWindow(t, 2.5, 6.2, 0.4)));

// P5 isolate block 1 to the left
for (let i = 1; i < 9; i++) tl.add(6.4, 0.6, p => blocks[i].g.setAttribute('opacity', 1 - p), E.io);
tl.add(6.6, 1.0, p => gridG.setAttribute('opacity', 1 - p), E.io);
tl.add(6.6, 1.0, p => B0.border.setAttribute('opacity', p), E.io);
tl.add(6.6, 1.6, p => {
  const tx = lerp(GX, LTX, p), ty = lerp(GY, LTY, p), s = lerp(1, FS, p);
  B0.g.setAttribute('transform', `translate(${tx} ${ty}) scale(${s})`);
}, E.io);
tl.add(6.5, 2.1, (p, t) => anIso.g.setAttribute('opacity', CV.inWindow(t, 6.5, 8.6, 0.4)));
tl.add(6.9, 0.5, p => titleA.g.setAttribute('opacity', 1 - p), E.io);
tl.add(8.3, 0.6, p => titleB.g.setAttribute('opacity', p), E.io);

// P6 block lands -> code + cluster + dividers set in place at once
tl.add(8.2, 0.7, p => {
  code.g.setAttribute('opacity', p);
  ccell.g.setAttribute('opacity', p);
  clab.setAttribute('opacity', p);
  Acells.forEach(m => m.g.setAttribute('opacity', p));
  Bcells.forEach(m => m.g.setAttribute('opacity', p));
  alabA.g.setAttribute('opacity', p);
  alabB.g.setAttribute('opacity', p);
  divV.setAttribute('opacity', p);
  divH.setAttribute('opacity', p);
}, E.io);
tl.add(9.4, 2.0, (p, t) => anMap.g.setAttribute('opacity', CV.inWindow(t, 9.4, 11.4, 0.4)));
tl.add(14.0, 3.6, (p, t) => anDot.g.setAttribute('opacity', CV.inWindow(t, 14.0, 17.6, 0.4)));

/* ---------- FINALE transitions (all guarded: inert until they start) ---------- */
// erase the right side except C
tl.add(18.0, 0.6, (p) => {
  if (p <= 0) return;
  const o = 1 - p;
  code.g.setAttribute('opacity', o);
  clab.setAttribute('opacity', o);
  Acells.forEach(m => m.g.setAttribute('opacity', o));
  Bcells.forEach(m => m.g.setAttribute('opacity', o));
  alabA.g.setAttribute('opacity', o);
  alabB.g.setAttribute('opacity', o);
  divH.setAttribute('opacity', o);
}, E.io);
tl.add(18.0, 0.5, (p) => { if (p > 0) titleB.g.setAttribute('opacity', 1 - p); }, E.io);
// C glides to the matrix's top-left slot; divider slides to true center
tl.add(18.6, 1.2, (p) => {
  if (p <= 0) return;
  ccell.g.setAttribute('transform', `translate(${(MX - CCX) * p} ${(MY - CCY) * p})`);
  divV.setAttribute('transform', `translate(${(640 - 470) * p} 0)`);
}, E.io);
// left side morphs back into the full grid of blocks
tl.add(18.2, 1.6, (p) => {
  if (p <= 0) return;
  const tx = lerp(LTX, GX2, p), ty = lerp(LTY, GY2, p), s = lerp(FS, S2, p);
  B0.g.setAttribute('transform', `translate(${tx} ${ty}) scale(${s})`);
}, E.io);
for (let i = 1; i < 9; i++) {
  const [sx, sy] = slot2(i);
  tl.add(19.3, 0.7, (p) => {
    if (p <= 0) return;
    blocks[i].g.setAttribute('transform', `translate(${sx} ${sy}) scale(${S2})`);
    blocks[i].g.setAttribute('opacity', p);
    blocks[i].border.setAttribute('opacity', p);
    glab2.g.setAttribute('opacity', p);
  }, E.io);
}
// matrix + labels + new title set in
tl.add(19.8, 0.6, (p) => {
  if (p <= 0) return;
  mcells.forEach(mc => mc.m.g.setAttribute('opacity', p));
  mlab.g.setAttribute('opacity', p);
}, E.io);
tl.add(19.9, 0.6, (p) => { if (p > 0) titleC.g.setAttribute('opacity', p); }, E.io);
tl.add(20.8, 3.6, (p, t) => anPar.g.setAttribute('opacity', CV.inWindow(t, 20.8, 24.4, 0.4)));

/* ---------- state: trace, highlights, bounce, parallel churn ---------- */
const SCHED = [[10.6, 2], [11.3, 3], [12.0, 4], [12.7, 5], [13.3, 6], [16.9, 7]];
const LOOP0 = 13.3, LOOPD = 0.85, LOOPEND = LOOP0 + K * LOOPD;   // 16.7
const JMP0 = 20.4, JMPEND = 24.4;

tl.state(t => {
  // --- thread motion: solo hero bounce, then ALL threads in parallel ---
  const bw = CV.inWindow(t, 9.2, 17.8, 0.4);          // hero solo (white)
  const jw = CV.inWindow(t, JMP0, JMPEND, 0.4);       // everyone (white)
  blocks.forEach((b, bi) => b.threads.forEach((th, j) => {
    const isHero = (b === B0 && j === HERO);
    let dy = 0, active = false;
    if (jw > 0) {                                     // parallel phase
      dy = -6 * Math.abs(Math.sin((t - JMP0) * 6 + (bi * 6 + j) * 0.7)) * jw;
      active = true;
    } else if (isHero && bw > 0) {                    // solo phase
      dy = -6 * Math.abs(Math.sin((t - 9.2) * 6)) * bw;
      active = true;
    }
    th.g.setAttribute('transform', `translate(0 ${dy.toFixed(2)})`);
    th.setColor(active ? 'fg' : 'neutral');
    th.g.setAttribute('opacity', isHero ? 1 : 1 - 0.55 * bw);
  }));

  // --- code cursor (blue highlight) ---
  const cop = CV.inWindow(t, 10.6, 17.8, 0.3) * 0.9;
  if (cop <= 0) { code.bar.set(code.yOfLine(2), 0); }
  else {
    let idx = 0;
    for (let i = 0; i < SCHED.length; i++) if (t >= SCHED[i][0]) idx = i;
    const curLine = SCHED[idx][1], prevLine = idx > 0 ? SCHED[idx - 1][1] : SCHED[0][1];
    const frac = Math.min(1, (t - SCHED[idx][0]) / 0.35);
    code.bar.set(lerp(code.yOfLine(prevLine), code.yOfLine(curLine), E.io(frac)), cop);
  }

  // --- loop index k ---
  let k = -1, ip = 0;
  if (t >= LOOP0 && t < LOOPEND) { const loc = (t - LOOP0) / LOOPD; k = Math.min(K - 1, loc | 0); ip = loc - k; }
  const done = t >= LOOPEND;

  // --- red identification flashes on the index lines ---
  const rowFlash = t >= 10.6 && t < 11.3;
  const colFlash = t >= 11.3 && t < 12.0;
  const cellFlash = t >= 10.6 && t < 12.0;

  // --- vector cell fills (base red; brighten when flashed or active) ---
  const fillFor = (on) => on ? 0.45 : 0.12;
  Acells.forEach((m, j) => m.fillRect.setAttribute('fill-opacity', fillFor(rowFlash || j === k)));
  Bcells.forEach((m, j) => m.fillRect.setAttribute('fill-opacity', fillFor(colFlash || j === k)));

  // --- sliding textured highlight rings over A[k] / B[k] ---
  const ringOp = CV.inWindow(t, LOOP0, LOOPEND, 0.2);
  const posF = k <= 0 ? Math.max(0, k) : (k - 1) + E.io(Math.min(1, ip / 0.3));
  ringA.setAttribute('opacity', ringOp);
  ringB.setAttribute('opacity', ringOp);
  ringA.setAttribute('transform', `translate(${Ax(0) + posF * VS} ${CCY})`);
  ringB.setAttribute('transform', `translate(${CCX} ${By(0) + posF * VS})`);

  // --- output cell C: texture while computing (both phases) ---
  cHatch.setAttribute('opacity', Math.max(CV.inWindow(t, LOOP0, 19.4, 0.25), jw));

  let cfo = 0.1, cv_val = null;
  if (t >= 12.2) {
    if (k < 0 && !done) { cfo = 0.12; cv_val = '0.00'; }
    else if (done) { cfo = 0.3; cv_val = total.toFixed(2); }
    else {
      const e = Math.max(0, Math.min(1, (ip - 0.35) / 0.5));
      cfo = 0.12 + 0.25 * ((k + e) / K);
      cv_val = (cumBefore[k] + prod[k] * e).toFixed(2);
    }
  }
  // finale: C churns with everyone while the threads jump, relocks after
  if (jw > 0.02 && t < JMPEND) {
    const step = Math.floor((t - JMP0) * 6);
    cv_val = mval(0, step).toFixed(2);
    cfo = 0.15 + 0.3 * jw * (0.5 + 0.5 * Math.sin(t * 13));
  }
  ccell.fillRect.setAttribute('fill-opacity', cfo);
  const showVal = cv_val !== null;
  if (showVal) cval.textContent = cv_val;
  cval.setAttribute('opacity', showVal ? 1 : 0);
  cvalPlate.setAttribute('opacity', showVal ? 1 : 0);
  ccell.fillRect.setAttribute('stroke-width', (cellFlash || k >= 0 || done) ? 2.5 : 1);

  // --- finale matrix: churn while jumping, freeze when it stops ---
  const started = t >= JMP0 - 0.1;
  mcells.forEach(mc => {
    if (!started) {
      mc.txt.setAttribute('opacity', 0);
      mc.plate.setAttribute('opacity', 0);
      mc.serp.setAttribute('opacity', 0);
      mc.m.fillRect.setAttribute('fill-opacity', 0.12);
      return;
    }
    mc.serp.setAttribute('opacity', jw);
    if (jw > 0.02 && t < JMPEND) {
      const step = Math.floor((t - JMP0) * 6);
      mc.txt.textContent = mval(mc.i, step).toFixed(2);
      const flick = 0.5 + 0.5 * Math.sin(t * 13 + mc.i * 2.3);
      mc.m.fillRect.setAttribute('fill-opacity', 0.15 + 0.3 * jw * flick);
    } else {
      mc.txt.textContent = mfinal(mc.i).toFixed(2);
      mc.m.fillRect.setAttribute('fill-opacity', t >= JMPEND ? 0.3 : 0.12);
    }
    mc.txt.setAttribute('opacity', 1);
    mc.plate.setAttribute('opacity', jw > 0.02 ? 1 : 0);
  });
});

CV.player(tl);
</script>
</body>
</html>
