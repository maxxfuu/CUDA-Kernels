:root { color-scheme: dark; }

body {
  margin: 0;
  background: #111111;
  min-height: 100vh;
  display: grid;
  place-items: center;
}

.cv-canvas {
  --cv-bg: #111111;       /* warm near-black */
  --cv-fg: #F0EDE6;       /* chalk white — all text */
  --cv-accent: #FF3B30;   /* signal red — work happening now + accents */
  --cv-traffic: #6DA7EC;  /* packet blue — data in motion (+ comet trails) */
  --cv-green: #FF3B30;    /* work: compute components (signal red) */
  --cv-blue: #27B648;     /* state: memory / data at rest (green) */
  --cv-neutral: #7E7C76;  /* cream @45% over bg — passive structure + connectors */
  background: var(--cv-bg);
  font-family: "Wafer Display", "ABC Schengen", "Archivo", system-ui, sans-serif;
}

.cv-canvas text {
  font-family: inherit;
  font-weight: 500;
  fill: var(--cv-fg);
  user-select: none;
}

/* player controls (hidden in ?mode=loop) */
.cv-controls {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 14px;
  display: flex;
  gap: 12px;
  align-items: center;
  color: #F0EDE6;
  font-family: "Wafer Display", "ABC Schengen", "Archivo", system-ui, sans-serif;
  font-size: 12px;
}
.cv-controls button {
  background: none;
  border: 1px solid #7E7C76;
  color: #F0EDE6;
  font: inherit;
  padding: 3px 12px;
  cursor: pointer;
}
.cv-controls button:hover { border-color: #F0EDE6; }
.cv-controls input[type="range"] {
  width: 300px;
  accent-color: #FF3B30;
}
.cv-controls .cv-time { min-width: 84px; text-align: right; }

</style>

<script>
/* ============================================================
   cuda-viz core library v0.1
   Vanilla SVG + JS diagram/animation primitives.
   Design rules (from PlanetScale brand diagrams):
   - one color per component
   - box = solid 2px outer rect + 8px-inset dashed (8 8) inner
     rect carrying fill-opacity 0.1 of the same color
   - 45° 1px hatch (clipPath'd to inner rect) = emphasis state
   - connectors: neutral gray 1px dashed (8 6), elbow-routed,
     small triangle arrowheads
   - data in motion: r=5 traffic-colored circles
   - labels: ALL-CAPS JetBrains Mono, fg color, bg plate
   - animation: rAF only; all track fns are pure functions of
     (progress, t) so the timeline is scrub- and seek-safe
   ============================================================ */
const CV = (() => {
  const NS = 'http://www.w3.org/2000/svg';
  const COLORS = {
    compute: 'var(--cv-green)',
    memory:  'var(--cv-blue)',
    neutral: 'var(--cv-neutral)',
    traffic: 'var(--cv-traffic)',
    accent:  'var(--cv-accent)',
    fg:      'var(--cv-fg)',
    bg:      'var(--cv-bg)',
  };
  let uid = 0;
  const nextId = (p) => `cv-${p}-${++uid}`;

  function el(tag, attrs = {}, parent) {
    const e = document.createElementNS(NS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    if (parent) parent.appendChild(e);
    return e;
  }
  const color = (c) => COLORS[c] || c;

  /* ---------- canvas ---------- */
  function canvas(root, { w = 1280, h = 720, auto = false } = {}) {
    const svg = el('svg', {
      viewBox: `0 0 ${w} ${h}`, width: w, height: h,
      class: 'cv-canvas' + (auto ? ' cv-auto' : ''),
    }, root);
    const defs = el('defs', {}, svg);
    const marker = el('marker', {
      id: 'cv-arrow', viewBox: '0 0 6 6', refX: 5, refY: 3,
      markerWidth: 6, markerHeight: 6, orient: 'auto-start-reverse',
    }, defs);
    el('path', { d: 'M 0 0 L 6 3 L 0 6 z', fill: 'var(--cv-neutral)' }, marker);
    return { svg, defs, w, h };
  }

  /* ---------- label with optional bg plate ---------- */
  function label(cv, { x, y, text, size = 17, fill = 'fg', anchor = 'middle', plate = true, lineHeight = 1.25 }) {
    const g = el('g', {}, cv.svg);
    const lines = Array.isArray(text) ? text : [String(text)];
    const t = el('text', {
      x, y, 'text-anchor': anchor, 'font-size': size,
      'dominant-baseline': 'middle',
    }, g);
    t.style.fill = color(fill); // inline style so it beats the theme's text{fill} rule
    lines.forEach((ln, i) => {
      el('tspan', { x, dy: i === 0 ? `${-(lines.length - 1) * lineHeight / 2}em` : `${lineHeight}em` }, t).textContent = ln;
    });
    let plateRect = null;
    if (plate) {
      const bb = t.getBBox();
      plateRect = el('rect', {
        x: bb.x - 5, y: bb.y - 2, width: bb.width + 10, height: bb.height + 4,
        fill: 'var(--cv-bg)',
      });
      g.insertBefore(plateRect, t);
    }
    return { g, t, plate: plateRect };
  }

  /* ---------- serpentine (single-stroke "active" texture) ---------- */
  // One continuous line: diagonals joined by short runs ALONG the region
  // border — the pen never lifts (replaces parallel hatching everywhere).
  // Activation is a DRAW-IN: progress 0→1 draws the line from its start.
  // The wrapper maps hatch.setAttribute('opacity', v) onto that progress
  // so existing diagram code works unchanged.
  function serpRect(x0, y0, x1, y1, gap) {
    const entry = (k) => k <= x0 + y1 ? [x0, k - x0] : [k - y1, y1];   // left ↓ then bottom →
    const exit  = (k) => k <= x1 + y0 ? [k - y0, y0] : [x1, k - x1];   // top → then right ↓
    const pts = [];
    let i = 0;
    for (let k = x0 + y0 + gap; k < x1 + y1; k += gap, i++) {
      const e1 = entry(k), e2 = exit(k);
      const up = i % 2 === 0;
      const a = up ? e1 : e2, b = up ? e2 : e1;
      if (pts.length) {
        const prev = pts[pts.length - 1];
        if (up  && prev[0] === x0 && a[1] === y1 && a[0] > x0) pts.push([x0, y1]);
        if (!up && prev[1] === y0 && a[0] === x1 && a[1] > y0) pts.push([x1, y0]);
      }
      pts.push(a, b);
    }
    if (!pts.length) return '';
    return 'M ' + pts.map(p => `${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(' L ');
  }
  function serpEllipse(cx, cy, rx, ry, gap) {
    const segs = [];
    const ang = (p) => Math.atan2((p[1] - cy) / ry, (p[0] - cx) / rx);
    let prev = null, i = 0;
    const kSpan = Math.hypot(rx, ry);
    for (let K = -kSpan + gap; K < kSpan; K += gap) {
      const a2 = 1 / (rx * rx) + 1 / (ry * ry);
      const b2 = -2 * K / (ry * ry);
      const c2 = K * K / (ry * ry) - 1;
      const disc = b2 * b2 - 4 * a2 * c2;
      if (disc <= 0) continue;
      const r = Math.sqrt(disc);
      const uLo = (-b2 - r) / (2 * a2), uHi = (-b2 + r) / (2 * a2);
      const k = K + cx + cy;
      const pLo = [cx + uLo, k - (cx + uLo)];   // lower-left end
      const pHi = [cx + uHi, k - (cx + uHi)];   // upper-right end
      const up = i % 2 === 0;
      const a = up ? pLo : pHi, b = up ? pHi : pLo;
      if (prev) {
        let d = ang(a) - ang(prev);
        while (d <= -Math.PI) d += 2 * Math.PI;
        while (d > Math.PI) d -= 2 * Math.PI;
        segs.push(`A ${rx} ${ry} 0 0 ${d > 0 ? 1 : 0} ${a[0].toFixed(2)} ${a[1].toFixed(2)}`);
      } else {
        segs.push(`M ${a[0].toFixed(2)} ${a[1].toFixed(2)}`);
      }
      segs.push(`L ${b[0].toFixed(2)} ${b[1].toFixed(2)}`);
      prev = b;
      i++;
    }
    return segs.join(' ');
  }
  function serpWrap(cv, g, d, col, { drawn = false, dashed = null } = {}) {
    // shows at once (opacity fade, like the old hatch — no draw-in).
    // if a dashed inner border is linked, it crossfades: dashes ease out
    // while the active texture is up, and ease back in as it fades away.
    const path = el('path', {
      d, fill: 'none', stroke: col, 'stroke-width': 1, opacity: drawn ? 1 : 0,
    }, g);
    return {
      el: path,
      setAttribute(attr, v) {
        if (attr === 'opacity') {
          const p = Math.max(0, Math.min(1, parseFloat(v) || 0));
          path.setAttribute('opacity', p);
          if (dashed) dashed.setAttribute('stroke-opacity', 1 - p);
        } else {
          path.setAttribute(attr, v);
        }
      },
    };
  }

  /* ---------- component box (the signature anatomy) ---------- */
  // contentTop: y-coord of the first child component inside the box; a top label
  // is vertically centered between the inner dashed edge and that content.
  function box(cv, { x, y, w, h, color: c = 'neutral', label: lbl = '', labelPos = 'center',
                     fontSize = 17, inset = 8, dash = '8 8', hatchGap = 10, contentTop = null }) {
    const col = color(c);
    const g = el('g', { class: 'cv-box' }, cv.svg);
    const outer = el('rect', { x, y, width: w, height: h, fill: 'none', stroke: col, 'stroke-width': 2 }, g);
    const ix = x + inset, iy = y + inset, iw = w - 2 * inset, ih = h - 2 * inset;
    const inner = el('rect', {
      x: ix, y: iy, width: iw, height: ih,
      fill: col, 'fill-opacity': 0.1,
      stroke: col, 'stroke-width': 1, 'stroke-dasharray': dash,
    }, g);
    // serpentine (emphasis state): one continuous stroke that rides the
    // inner border between diagonals; crossfades with the dashed inner rect
    const hatch = serpWrap(cv, g, serpRect(ix, iy, ix + iw, iy + ih, hatchGap), col, { dashed: inner });
    let labelApi = null;
    if (lbl) {
      const ly = labelPos === 'top'
        ? (contentTop !== null ? (y + inset + contentTop) / 2 : y + inset + 16)
        : y + h / 2;
      labelApi = label(cv, { x: x + w / 2, y: ly, text: lbl, size: fontSize });
      g.appendChild(labelApi.g);
    }
    return { g, outer, inner, hatch, label: labelApi, x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
  }

  /* ---------- mini box (small cells/chips: 1px solid + 0.1 fill, bg plate) ---------- */
  function miniBox(cv, { x, y, w, h, color: c = 'neutral', label: lbl = '', fontSize = 13 }) {
    const col = color(c);
    const g = el('g', { class: 'cv-mini' }, cv.svg);
    el('rect', { x, y, width: w, height: h, fill: 'var(--cv-bg)' }, g); // occlusion plate
    const fillRect = el('rect', { x, y, width: w, height: h, fill: col, 'fill-opacity': 0.1, stroke: col, 'stroke-width': 1 }, g);
    let text = null;
    if (lbl) {
      text = el('text', {
        x: x + w / 2, y: y + h / 2, 'text-anchor': 'middle',
        'dominant-baseline': 'central', 'font-size': fontSize,
      }, g);
      text.textContent = lbl;
    }
    return { g, fillRect, text, x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
  }

  /* ---------- cylinder (memory/storage; hatched top face) ---------- */
  function cylinder(cv, { x, y, w, h, color: c = 'memory', label: lbl = '', fontSize = 17, ry = null }) {
    const col = color(c);
    const eRy = ry || Math.min(18, h / 5);
    const g = el('g', { class: 'cv-cyl' }, cv.svg);
    const body = el('path', {
      d: `M ${x} ${y + eRy} L ${x} ${y + h - eRy}
          A ${w / 2} ${eRy} 0 0 0 ${x + w} ${y + h - eRy}
          L ${x + w} ${y + eRy}`,
      fill: col, 'fill-opacity': 0.1, stroke: col, 'stroke-width': 2,
    }, g);
    // top face carries the permanent serpentine (single stroke riding the rim)
    const hatch = serpWrap(cv, g,
      serpEllipse(x + w / 2, y + eRy, w / 2 - 3, Math.max(3, eRy - 2), 8), col, { drawn: true });
    // fill level ("liquid") — state lives IN the component: memory filling/freeing
    // is shown by raising/draining this level, never by symbolic dots leaving.
    const lvlBody = el('path', { fill: col, 'fill-opacity': 0.3, stroke: 'none', opacity: 0 }, g);
    const lvlTop = el('ellipse', {
      rx: w / 2, ry: eRy, fill: col, 'fill-opacity': 0.25,
      stroke: col, 'stroke-width': 1, opacity: 0,
    }, g);
    function setLevel(v) {
      if (v <= 0.005) { lvlBody.setAttribute('opacity', 0); lvlTop.setAttribute('opacity', 0); return; }
      const innerTop = y + 2 * eRy, innerBot = y + h - eRy;
      const yl = innerBot - Math.min(1, v) * (innerBot - innerTop);
      lvlBody.setAttribute('d',
        `M ${x} ${yl} L ${x} ${innerBot}
         A ${w / 2} ${eRy} 0 0 0 ${x + w} ${innerBot}
         L ${x + w} ${yl}
         A ${w / 2} ${eRy} 0 0 1 ${x} ${yl}`);
      lvlTop.setAttribute('cx', x + w / 2);
      lvlTop.setAttribute('cy', yl);
      lvlBody.setAttribute('opacity', 1);
      lvlTop.setAttribute('opacity', 1);
    }
    el('ellipse', {
      cx: x + w / 2, cy: y + eRy, rx: w / 2, ry: eRy,
      fill: 'none', stroke: col, 'stroke-width': 2,
    }, g);
    let labelApi = null;
    if (lbl) {
      labelApi = label(cv, { x: x + w / 2, y: y + h / 2 + eRy / 2, text: lbl, size: fontSize });
      g.appendChild(labelApi.g);
    }
    return { g, hatch, setLevel, x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
  }

  /* ---------- connectors ---------- */
  // points: [[x,y], ...] — orthogonal elbow routing expected
  function elbow(cv, points, { dash = '8 6', arrow = true, color: c = 'neutral', hidden = false } = {}) {
    const d = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');
    const attrs = { d, fill: 'none' };
    if (hidden) {
      attrs.stroke = 'none';
    } else {
      attrs.stroke = color(c);
      attrs['stroke-width'] = 1;
      if (dash) attrs['stroke-dasharray'] = dash;
      if (arrow) attrs['marker-end'] = 'url(#cv-arrow)';
    }
    const path = el('path', attrs, cv.svg);
    return path;
  }

  /* ---------- traffic particles (pooled; head + fading trail) ---------- */
  // each particle is a head circle plus a short comet trail of smaller,
  // dimmer circles trailing BEHIND it along the same path — movement reads
  // even in a single frame. Trail circles are created first (under the head).
  const TRAIL_R = [3.4, 2.5, 1.7];
  const TRAIL_O = [0.5, 0.3, 0.15];
  const TRAIL_SPACING = 9; // px behind the head, per segment
  function particles(cv, n) {
    const pool = [];
    for (let i = 0; i < n; i++) {
      const trail = TRAIL_R.map((r, k) =>
        el('circle', { r, fill: 'var(--cv-traffic)', opacity: 0 }, cv.svg));
      const head = el('circle', { r: 5, fill: 'var(--cv-traffic)', opacity: 0 }, cv.svg);
      pool.push({
        head, trail,
        // legacy escape hatch: diagrams that hide a dot directly still work
        setAttribute(attr, v) {
          head.setAttribute(attr, v);
          if (attr === 'opacity' && !(parseFloat(v) > 0)) trail.forEach(c => c.setAttribute('opacity', 0));
        },
      });
    }
    return pool;
  }
  const _lenCache = new WeakMap();
  // place dot (head + trail) along path at progress p; hides at p<=0 or p>=1
  function dotAlong(dot, path, p) {
    const head = dot.head || dot;             // plain circles still work
    const trail = dot.trail || [];
    if (p <= 0 || p >= 1) {
      head.setAttribute('opacity', 0);
      trail.forEach(c => c.setAttribute('opacity', 0));
      return;
    }
    let L = _lenCache.get(path);
    if (L === undefined) { L = path.getTotalLength(); _lenCache.set(path, L); }
    const at = (dist, node, o) => {
      if (dist <= 0) { node.setAttribute('opacity', 0); return; }
      const pt = path.getPointAtLength(dist);
      node.setAttribute('cx', pt.x);
      node.setAttribute('cy', pt.y);
      node.setAttribute('opacity', o);
    };
    at(p * L, head, 1);
    trail.forEach((c, k) => at(p * L - (k + 1) * TRAIL_SPACING, c, TRAIL_O[k]));
  }

  /* ---------- timeline (stateless, scrub-safe) ---------- */
  const ease = {
    linear: (p) => p,
    io: (p) => p * p * (3 - 2 * p),
  };
  // Global pacing: every diagram plays STRETCH× slower than its authored
  // times. Track times and state windows stay in "story time" — render()
  // maps stretched wall-clock time back before evaluating, so existing
  // diagram code needs no changes.
  const STRETCH = 1.25;
  function timeline(duration) {
    const tracks = [];
    const api = {
      duration: duration * STRETCH,
      // fn(progress in [0,1], absoluteT) — must be idempotent
      add(start, dur, fn, e) {
        tracks.push({ start, dur: Math.max(dur, 1e-9), fn, e: e || ease.linear });
        return api;
      },
      // always-on state track: fn(t) every render (runs after transitions)
      state(fn) { tracks.push({ state: fn }); return api; },
      render(t) {
        const s = t / STRETCH;
        for (const tr of tracks) {
          if (tr.state) { tr.state(s); continue; }
          let p = (s - tr.start) / tr.dur;
          p = p < 0 ? 0 : p > 1 ? 1 : p;
          tr.fn(tr.e(p), s);
        }
      },
    };
    return api;
  }
  // helper: 0→1→0 window with soft edges (for hatch/exec states)
  function inWindow(t, start, end, fade = 0.3) {
    if (t <= start || t >= end) return 0;
    return Math.min(1, (t - start) / fade, (end - t) / fade);
  }

  /* ---------- player: rAF loop + controls + deterministic seek ---------- */
  function player(tl, { root = document.body } = {}) {
    const params = new URLSearchParams(location.search);
    const loopMode = params.get('mode') === 'loop';
    let playing = true;
    let base = performance.now() / 1000;
    let offset = params.has('t') ? parseFloat(params.get('t')) : 0;
    const cur = () => ((performance.now() / 1000 - base) + offset) % tl.duration;

    let ui = null;
    if (!loopMode) {
      ui = document.createElement('div');
      ui.className = 'cv-controls';
      ui.innerHTML = `<button class="cv-play">PAUSE</button>
        <input type="range" min="0" max="${tl.duration}" step="0.01" value="0">
        <span class="cv-time">0.00 / ${tl.duration.toFixed(2)}s</span>`;
      root.appendChild(ui);
      const btn = ui.querySelector('button');
      const rng = ui.querySelector('input');
      btn.addEventListener('click', () => {
        if (playing) { offset = cur(); playing = false; btn.textContent = 'PLAY'; }
        else { base = performance.now() / 1000; playing = true; btn.textContent = 'PAUSE'; }
      });
      rng.addEventListener('input', () => {
        playing = false; btn.textContent = 'PLAY';
        offset = parseFloat(rng.value);
        tl.render(offset);
        ui.querySelector('.cv-time').textContent = `${offset.toFixed(2)} / ${tl.duration.toFixed(2)}s`;
      });
    }
    // deterministic seek for frame capture / video export
    window.__seek = (t) => { playing = false; offset = t % tl.duration; tl.render(offset); };
    window.__duration = tl.duration;

    function frame() {
      if (playing) {
        const t = cur();
        tl.render(t);
        if (ui) {
          ui.querySelector('input').value = t;
          ui.querySelector('.cv-time').textContent = `${t.toFixed(2)} / ${tl.duration.toFixed(2)}s`;
        }
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  return { el, color, canvas, label, box, miniBox, cylinder, elbow, particles, dotAlong, timeline, ease, inWindow, player };
})();

</script>
<script>
/* ============================================================
   MNIST MLP — FORWARD & BACKWARD SHAPES  (batch = 8)
   Top band: forward pass, activations flow left→right through
   two Linear layers, ReLU, softmax, cross-entropy.
   Bottom band: backward pass, gradients flow right→left,
   producing weight grads that feed the SGD update.
   Every tensor box is labelled with its actual shape.
   ============================================================ */
const cv = CV.canvas(document.body, { w: 1280, h: 720 });

const FY = 232, FH = 92, FC = FY + FH / 2;   // forward main row
const BY = 486, BH = 92, BC = BY + BH / 2;   // backward main row
const cxOf = b => b.x + b.w / 2;

/* ---------- static composition ---------- */

// title + batch note
CV.label(cv, { x: 640, y: 28, text: 'MNIST MLP  —  FORWARD & BACKWARD SHAPES', size: 20, plate: false });
CV.label(cv, { x: 640, y: 50, text: 'BATCH = 8   ·   784 → 256 → 10', size: 13, fill: 'neutral', plate: false });

// phase labels (windowed, share a slot)
const fwdTag = CV.label(cv, { x: 30, y: 42, text: 'FORWARD PASS', size: 18, fill: 'accent', anchor: 'start', plate: false });
const bwdTag = CV.label(cv, { x: 30, y: 42, text: 'BACKWARD PASS', size: 18, fill: 'accent', anchor: 'start', plate: false });
bwdTag.g.setAttribute('opacity', 0);

/* -- forward main-row tensors (memory = data at rest, green) -- */
const X      = CV.box(cv, { x: 24,   y: FY, w: 112, h: FH, color: 'memory', label: ['X', '8 × 784'],      fontSize: 15 });
const Z1     = CV.box(cv, { x: 248,  y: FY, w: 112, h: FH, color: 'memory', label: ['Z1', '8 × 256'],     fontSize: 15 });
const A1     = CV.box(cv, { x: 472,  y: FY, w: 112, h: FH, color: 'memory', label: ['A1', '8 × 256'],     fontSize: 15 });
const LOGITS = CV.box(cv, { x: 696,  y: FY, w: 112, h: FH, color: 'memory', label: ['LOGITS', '8 × 10'],  fontSize: 15 });
const PROBS  = CV.box(cv, { x: 920,  y: FY, w: 112, h: FH, color: 'memory', label: ['PROBS', '8 × 10'],   fontSize: 15 });

/* -- forward op nodes (compute = work, red) -- */
const op1  = CV.box(cv, { x: 150, y: FY, w: 84,  h: FH, color: 'compute', label: ['MAT', 'MUL'],  fontSize: 13 });
const op2  = CV.box(cv, { x: 374, y: FY, w: 84,  h: FH, color: 'compute', label: ['RE', 'LU'],    fontSize: 13 });
const op3  = CV.box(cv, { x: 598, y: FY, w: 84,  h: FH, color: 'compute', label: ['MAT', 'MUL'],  fontSize: 13 });
const op4  = CV.box(cv, { x: 822, y: FY, w: 84,  h: FH, color: 'compute', label: ['SOFT', 'MAX'], fontSize: 13 });
const loss = CV.box(cv, { x: 1075, y: FY, w: 150, h: FH, color: 'compute', label: ['CROSS-ENTROPY', 'LOSS → SCALAR'], fontSize: 13 });

/* -- weights + biases (parameters, at rest, green) -- */
const W1 = CV.box(cv, { x: 118, y: 74, w: 118, h: 64, color: 'memory', label: ['W1', '784 × 256'], fontSize: 13 });
const W2 = CV.box(cv, { x: 560, y: 74, w: 118, h: 64, color: 'memory', label: ['W2', '256 × 10'],  fontSize: 13 });
const b1 = CV.miniBox(cv, { x: 250, y: 88, w: 52, h: 40, color: 'memory', label: 'b1  256', fontSize: 11 });
const b2 = CV.miniBox(cv, { x: 692, y: 88, w: 52, h: 40, color: 'memory', label: 'b2  10',  fontSize: 11 });

/* -- backward main-row tensors -- */
const gradN  = CV.box(cv, { x: 1075, y: BY, w: 150, h: BH, color: 'compute', label: ['SOFTMAX + CE', 'GRAD'], fontSize: 13 });
const dLOG   = CV.box(cv, { x: 920,  y: BY, w: 112, h: BH, color: 'memory', label: ['dLOGITS', '8 × 10'],  fontSize: 15 });
const dA1    = CV.box(cv, { x: 696,  y: BY, w: 112, h: BH, color: 'memory', label: ['dA1', '8 × 256'],     fontSize: 15 });
const dZ1    = CV.box(cv, { x: 472,  y: BY, w: 112, h: BH, color: 'memory', label: ['dZ1', '8 × 256'],     fontSize: 15 });
const dX     = CV.box(cv, { x: 248,  y: BY, w: 112, h: BH, color: 'memory', label: ['dX', '8 × 784'],      fontSize: 15 });

/* -- backward op nodes -- */
const opb1 = CV.box(cv, { x: 822, y: BY, w: 84, h: BH, color: 'compute', label: ['LINEAR2', 'BWD'], fontSize: 12 });
const opb2 = CV.box(cv, { x: 598, y: BY, w: 84, h: BH, color: 'compute', label: ['RELU', 'BWD'],   fontSize: 12 });
const opb3 = CV.box(cv, { x: 374, y: BY, w: 84, h: BH, color: 'compute', label: ['LINEAR1', 'BWD'], fontSize: 12 });

/* -- weight-gradient chips (produced by backward, feed SGD) -- */
const dW2 = CV.miniBox(cv, { x: 770, y: 632, w: 104, h: 40, color: 'memory', label: 'dW2  256×10', fontSize: 11 });
const db2 = CV.miniBox(cv, { x: 880, y: 632, w: 60,  h: 40, color: 'memory', label: 'db2  10',     fontSize: 11 });
const dW1 = CV.miniBox(cv, { x: 322, y: 632, w: 104, h: 40, color: 'memory', label: 'dW1  784×256', fontSize: 11 });
const db1 = CV.miniBox(cv, { x: 432, y: 632, w: 60,  h: 40, color: 'memory', label: 'db1  256',    fontSize: 11 });
[dW2, db2, dW1, db1].forEach(c => c.g.setAttribute('opacity', 0));

/* -- equation annotations (accent, windowed) -- */
const mkEq = (x, y, text) => {
  const l = CV.label(cv, { x, y, text, size: 13, fill: 'accent', plate: true });
  l.g.setAttribute('opacity', 0); return l;
};
const eqF1 = mkEq(192, 372, 'Z1 = X · W1 + b1');
const eqF2 = mkEq(416, 372, 'A1 = ReLU(Z1)');
const eqF3 = mkEq(640, 372, 'LOGITS = A1 · W2 + b2');
const eqF4 = mkEq(864, 372, 'P = softmax(LOGITS)');
const eqF5 = mkEq(1150, 372, 'L = − Σ log P[y] / N');
const eqB0 = mkEq(1000, 446, 'dLOGITS = (P − Y) / N');
const eqB1 = mkEq(864, 446, 'dA1 = dLOGITS · W2ᵀ');
const eqB2 = mkEq(640, 446, 'dZ1 = dA1 ⊙ 1[Z1 > 0]');
const eqB3 = mkEq(416, 446, 'dX = dZ1 · W1ᵀ');
const sgdLbl = mkEq(640, 700, 'SGD:   W ← W − lr · ∇W        (lr = 0.01)');

/* ---------- connectors ---------- */
// forward main chain (arrows point right)
const fchain = [X, op1, Z1, op2, A1, op3, LOGITS, op4, PROBS, loss];
for (let i = 0; i < fchain.length - 1; i++)
  CV.elbow(cv, [[fchain[i].x + fchain[i].w, FC], [fchain[i + 1].x, FC]]);
// backward main chain (arrows point left)
const bchain = [gradN, dLOG, opb1, dA1, opb2, dZ1, opb3, dX];
for (let i = 0; i < bchain.length - 1; i++)
  CV.elbow(cv, [[bchain[i].x, BC], [bchain[i + 1].x + bchain[i + 1].w, BC]]);

// weight/bias feeds into the matmul nodes (structural)
CV.elbow(cv, [[cxOf(W1), 138], [cxOf(W1), 200], [192, 200], [192, FY]]);
CV.elbow(cv, [[cxOf(b1), 128], [cxOf(b1), 205], [210, 205], [210, FY]]);
CV.elbow(cv, [[cxOf(W2), 138], [cxOf(W2), 200], [640, 200], [640, FY]]);
CV.elbow(cv, [[cxOf(b2), 128], [cxOf(b2), 205], [672, 205], [672, FY]]);

// gradient-chip emission (from backward nodes down to chips)
CV.elbow(cv, [[cxOf(opb1), BY + BH], [cxOf(opb1), 612], [cxOf(dW2), 612], [cxOf(dW2), 632]]);
CV.elbow(cv, [[cxOf(opb1), BY + BH], [cxOf(opb1), 612], [cxOf(db2), 612], [cxOf(db2), 632]]);
CV.elbow(cv, [[cxOf(opb3), BY + BH], [cxOf(opb3), 612], [cxOf(dW1), 612], [cxOf(dW1), 632]]);
CV.elbow(cv, [[cxOf(opb3), BY + BH], [cxOf(opb3), 612], [cxOf(db1), 612], [cxOf(db1), 632]]);

/* ---------- hidden routing paths (particles ride these) ---------- */
const pf1 = CV.elbow(cv, [[X.x + X.w, FC], [Z1.x, FC]], { hidden: true });
const pf2 = CV.elbow(cv, [[Z1.x + Z1.w, FC], [A1.x, FC]], { hidden: true });
const pf3 = CV.elbow(cv, [[A1.x + A1.w, FC], [LOGITS.x, FC]], { hidden: true });
const pf4 = CV.elbow(cv, [[LOGITS.x + LOGITS.w, FC], [PROBS.x, FC]], { hidden: true });
const pf5 = CV.elbow(cv, [[PROBS.x + PROBS.w, FC], [loss.x, FC]], { hidden: true });
const pw1 = CV.elbow(cv, [[cxOf(W1), 138], [cxOf(W1), 200], [192, 200], [192, FY]], { hidden: true });
const pb1p = CV.elbow(cv, [[cxOf(b1), 128], [cxOf(b1), 205], [210, 205], [210, FY]], { hidden: true });
const pw2 = CV.elbow(cv, [[cxOf(W2), 138], [cxOf(W2), 200], [640, 200], [640, FY]], { hidden: true });
const pb2p = CV.elbow(cv, [[cxOf(b2), 128], [cxOf(b2), 205], [672, 205], [672, FY]], { hidden: true });
// backward legs (source → dest, left-flowing)
const bg  = CV.elbow(cv, [[gradN.x, BC], [dLOG.x + dLOG.w, BC]], { hidden: true });
const pb1 = CV.elbow(cv, [[dLOG.x, BC], [dA1.x + dA1.w, BC]], { hidden: true });
const pb2 = CV.elbow(cv, [[dA1.x, BC], [dZ1.x + dZ1.w, BC]], { hidden: true });
const pb3 = CV.elbow(cv, [[dZ1.x, BC], [dX.x + dX.w, BC]], { hidden: true });

/* ---------- legend ---------- */
const legend = [['compute', 'COMPUTE (OP)'], ['memory', 'DATA / WEIGHT'], ['traffic', 'IN FLIGHT']];
legend.forEach(([c, txt], i) => {
  const ly = 656 + i * 22;
  CV.el('rect', { x: 24, y: ly - 9, width: 14, height: 14, fill: CV.color(c), 'fill-opacity': 0.35, stroke: CV.color(c), 'stroke-width': 1 }, cv.svg);
  CV.label(cv, { x: 46, y: ly - 2, text: txt, size: 11, fill: 'neutral', anchor: 'start', plate: false });
});

/* ---------- particles (drawn last; one dedicated dot per flight leg) ---------- */
const dots = CV.particles(cv, 13);

/* ---------- animation ---------- */
const DUR = 20;
const tl = CV.timeline(DUR);

// downstream tensors + nodes start dim; parameters stay lit
[Z1, A1, LOGITS, PROBS, loss, gradN, dLOG, dA1, dZ1, dX].forEach(b => b.g.setAttribute('opacity', 0.22));

// fill helper: dim → lit (green data settling in place)
const fill = (b, t0, d = 0.5) => tl.add(t0, d, p => {
  b.g.setAttribute('opacity', 0.22 + 0.78 * p);
  if (b.inner) b.inner.setAttribute('fill-opacity', 0.1 + 0.22 * p);
}, CV.ease.io);

// phase tags
tl.add(0.2, 8.8, (p, t) => fwdTag.g.setAttribute('opacity', CV.inWindow(t, 0.2, 9.2, 0.4)));
tl.add(9.0, 10.5, (p, t) => bwdTag.g.setAttribute('opacity', CV.inWindow(t, 9.0, 19.6, 0.4)));

/* ----- FORWARD ----- */
fill(X, 0.4);
// Linear 1
tl.add(1.0, 1.0, p => CV.dotAlong(dots[0], pf1, p), CV.ease.io);
tl.add(1.0, 1.0, p => CV.dotAlong(dots[1], pw1, p), CV.ease.io);
tl.add(1.0, 1.0, p => CV.dotAlong(dots[2], pb1p, p), CV.ease.io);
fill(Z1, 2.0);
tl.add(0.9, 2.1, (p, t) => eqF1.g.setAttribute('opacity', CV.inWindow(t, 0.9, 3.0, 0.3)));
// ReLU
tl.add(3.0, 0.8, p => CV.dotAlong(dots[3], pf2, p), CV.ease.io);
fill(A1, 3.7);
tl.add(3.0, 1.3, (p, t) => eqF2.g.setAttribute('opacity', CV.inWindow(t, 3.0, 4.3, 0.3)));
// Linear 2
tl.add(4.6, 1.0, p => CV.dotAlong(dots[4], pf3, p), CV.ease.io);
tl.add(4.6, 1.0, p => CV.dotAlong(dots[5], pw2, p), CV.ease.io);
tl.add(4.6, 1.0, p => CV.dotAlong(dots[6], pb2p, p), CV.ease.io);
fill(LOGITS, 5.6);
tl.add(4.5, 1.7, (p, t) => eqF3.g.setAttribute('opacity', CV.inWindow(t, 4.5, 6.2, 0.3)));
// Softmax
tl.add(6.4, 0.8, p => CV.dotAlong(dots[7], pf4, p), CV.ease.io);
fill(PROBS, 7.1);
tl.add(6.4, 1.4, (p, t) => eqF4.g.setAttribute('opacity', CV.inWindow(t, 6.4, 7.8, 0.3)));
// Cross-entropy
tl.add(7.9, 0.7, p => CV.dotAlong(dots[8], pf5, p), CV.ease.io);
fill(loss, 8.6);
tl.add(7.9, 1.3, (p, t) => eqF5.g.setAttribute('opacity', CV.inWindow(t, 7.9, 9.2, 0.3)));

/* ----- BACKWARD ----- */
fill(gradN, 9.2, 0.4);
tl.add(9.6, 0.8, p => CV.dotAlong(dots[9], bg, p), CV.ease.io);
fill(dLOG, 10.3);
tl.add(9.4, 1.6, (p, t) => eqB0.g.setAttribute('opacity', CV.inWindow(t, 9.4, 11.0, 0.3)));
// Linear2 bwd
tl.add(10.9, 0.8, p => CV.dotAlong(dots[10], pb1, p), CV.ease.io);
fill(dA1, 11.6);
tl.add(10.9, 1.5, (p, t) => eqB1.g.setAttribute('opacity', CV.inWindow(t, 10.9, 12.4, 0.3)));
tl.add(11.6, 8.0, (p, t) => { const o = CV.inWindow(t, 11.6, 19.6, 0.3); dW2.g.setAttribute('opacity', o); db2.g.setAttribute('opacity', o); });
// ReLU bwd
tl.add(12.5, 0.8, p => CV.dotAlong(dots[11], pb2, p), CV.ease.io);
fill(dZ1, 13.2);
tl.add(12.5, 1.4, (p, t) => eqB2.g.setAttribute('opacity', CV.inWindow(t, 12.5, 13.9, 0.3)));
// Linear1 bwd
tl.add(14.0, 0.8, p => CV.dotAlong(dots[12], pb3, p), CV.ease.io);
fill(dX, 14.7);
tl.add(14.0, 1.5, (p, t) => eqB3.g.setAttribute('opacity', CV.inWindow(t, 14.0, 15.5, 0.3)));
tl.add(14.7, 4.9, (p, t) => { const o = CV.inWindow(t, 14.7, 19.6, 0.3); dW1.g.setAttribute('opacity', o); db1.g.setAttribute('opacity', o); });

/* ----- SGD update: parameters pulse green in place ----- */
tl.add(15.8, 3.0, (p, t) => sgdLbl.g.setAttribute('opacity', CV.inWindow(t, 15.8, 18.8, 0.4)));

/* ----- continuous states: op serpentines (active = work now) ----- */
tl.state(t => {
  op1.hatch.setAttribute('opacity', CV.inWindow(t, 1.0, 2.2, 0.25));
  op2.hatch.setAttribute('opacity', CV.inWindow(t, 3.0, 3.9, 0.25));
  op3.hatch.setAttribute('opacity', CV.inWindow(t, 4.6, 5.8, 0.25));
  op4.hatch.setAttribute('opacity', CV.inWindow(t, 6.4, 7.3, 0.25));
  loss.hatch.setAttribute('opacity', CV.inWindow(t, 7.9, 8.8, 0.25));
  gradN.hatch.setAttribute('opacity', CV.inWindow(t, 9.2, 10.2, 0.25));
  opb1.hatch.setAttribute('opacity', CV.inWindow(t, 10.9, 11.9, 0.25));
  opb2.hatch.setAttribute('opacity', CV.inWindow(t, 12.5, 13.4, 0.25));
  opb3.hatch.setAttribute('opacity', CV.inWindow(t, 14.0, 15.0, 0.25));
  // SGD pulse on the four parameters (green state refresh in place)
  const s = CV.inWindow(t, 15.8, 18.8, 0.5);
  [W1, W2].forEach(b => { b.hatch.setAttribute('opacity', s); b.inner.setAttribute('fill-opacity', 0.1 + 0.28 * s); });
  [b1, b2].forEach(c => c.fillRect.setAttribute('fill-opacity', 0.1 + 0.35 * s));
  [dW1, dW2, db1, db2].forEach(c => c.fillRect.setAttribute('fill-opacity', 0.1 + 0.3 * s));
});

CV.player(tl);
</script>
</body>
</html>
